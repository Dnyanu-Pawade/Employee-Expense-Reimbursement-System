version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: enterprise-mysql
    environment:
      MYSQL_ROOT_PASSWORD: Dnyanu@123
      MYSQL_DATABASE: enterprise_expense
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: enterprise-expense-app
    ports:
      - "8082:8082"
    environment:
      JDBC_DATABASE_URL: jdbc:mysql://mysql:3306/enterprise_expense?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: Dnyanu@123
      JWT_SECRET: EnterpriseExpensePlatformSecretKey2024VeryLongSecureKey!@#$%^&*
      PORT: 8082
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql-data:

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Finance Dashboard | Enterprise Expense</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Finance Portal</span></div>
  <nav class="sidebar-nav">
    <a href="finance-dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
    <a href="payment-history.html" class="nav-item"><i class="fas fa-money-bill"></i> Payment History</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Finance Dashboard</h5><button class="btn btn-success btn-sm" onclick="api.downloadAllExcel()"><i class="fas fa-file-excel me-1"></i>Export</button></div>
  <div class="content-body">
    <div class="row g-3 mb-3">
      <div class="col-md-6">
        <div class="card">
          <div class="card-header"><h6>Verify Claims (Manager Approved)</h6></div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0">
              <thead class="table-light"><tr><th>Claim #</th><th>Employee</th><th>Amount</th><th>Actions</th></tr></thead>
              <tbody id="verify-body"><tr><td colspan="4" class="text-center py-3">Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card">
          <div class="card-header"><h6>Process Payment (Finance Verified)</h6></div>
          <div class="card-body p-0">
            <table class="table table-hover mb-0">
              <thead class="table-light"><tr><th>Claim #</th><th>Employee</th><th>Amount</th><th>Actions</th></tr></thead>
              <tbody id="payment-body"><tr><td colspan="4" class="text-center py-3">Loading...</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
</div>
<div class="modal fade" id="actionModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modal-title">Action</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div id="payment-fields" class="d-none">
        <div class="mb-2"><label class="form-label">Payment Reference *</label><input type="text" id="paymentRef" class="form-control"/></div>
        <div class="mb-2"><label class="form-label">Bank Transfer Ref</label><input type="text" id="bankRef" class="form-control"/></div>
        <div class="mb-2"><label class="form-label">Payment Mode</label><select id="paymentMode" class="form-select"><option>BANK_TRANSFER</option><option>CHEQUE</option><option>CASH</option><option>UPI</option></select></div>
      </div>
      <div class="mb-2"><label class="form-label">Comment</label><textarea id="action-comment" class="form-control" rows="2"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" id="confirm-btn">Confirm</button>
      <button class="btn btn-danger" id="reject-btn" style="display:none">Reject</button>
      <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
    </div>
  </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
let selectedId=null, currentMode='verify';
const modal = new bootstrap.Modal(document.getElementById('actionModal'));
async function loadVerify() {
  const claims = await api.getFinancePending();
  const tbody = document.getElementById('verify-body');
  if (!claims.length) { tbody.innerHTML='<tr><td colspan="4" class="text-center py-3 text-muted">No claims pending</td></tr>'; return; }
  tbody.innerHTML = claims.map(c=>`<tr><td><small>${c.claimNumber}</small></td><td>${c.employee?.fullName||'-'}</td><td class="fw-semibold text-success">₹${parseFloat(c.amount).toFixed(2)}</td><td><button class="btn btn-primary btn-sm me-1" onclick="openAction(${c.id},'verify')"><i class="fas fa-check"></i></button><button class="btn btn-danger btn-sm" onclick="openAction(${c.id},'verify-reject')"><i class="fas fa-times"></i></button></td></tr>`).join('');
}
async function loadPayment() {
  const claims = await api.getFinanceVerified();
  const tbody = document.getElementById('payment-body');
  if (!claims.length) { tbody.innerHTML='<tr><td colspan="4" class="text-center py-3 text-muted">No claims pending</td></tr>'; return; }
  tbody.innerHTML = claims.map(c=>`<tr><td><small>${c.claimNumber}</small></td><td>${c.employee?.fullName||'-'}</td><td class="fw-semibold text-success">₹${parseFloat(c.amount).toFixed(2)}</td><td><button class="btn btn-success btn-sm" onclick="openAction(${c.id},'payment')"><i class="fas fa-money-bill me-1"></i>Pay</button></td></tr>`).join('');
}
function openAction(id, mode) {
  selectedId=id; currentMode=mode;
  document.getElementById('modal-title').textContent = mode==='payment'?'Process Payment':mode==='verify-reject'?'Reject Claim':'Verify Claim';
  document.getElementById('payment-fields').classList.toggle('d-none', mode!=='payment');
  document.getElementById('action-comment').value='';
  document.getElementById('reject-btn').style.display = mode==='verify'?'inline-block':'none';
  document.getElementById('confirm-btn').textContent = mode==='payment'?'Process Payment':mode==='verify-reject'?'Reject':'Verify';
  document.getElementById('confirm-btn').className = mode==='verify-reject'?'btn btn-danger':'btn btn-success';
  modal.show();
}
document.getElementById('confirm-btn').addEventListener('click', async()=>{
  try {
    if (currentMode==='verify') { await api.financeVerify(selectedId, document.getElementById('action-comment').value); showToast('Claim verified!'); loadVerify(); }
    else if (currentMode==='verify-reject') { await api.financeReject(selectedId, document.getElementById('action-comment').value); showToast('Claim rejected'); loadVerify(); }
    else { await api.processPayment(selectedId,{paymentReference:document.getElementById('paymentRef').value,bankTransferRef:document.getElementById('bankRef').value,paymentMode:document.getElementById('paymentMode').value,notes:document.getElementById('action-comment').value}); showToast('Payment processed!'); loadPayment(); }
    modal.hide();
  } catch(e) { showToast(e.message,'error'); }
});
document.addEventListener('DOMContentLoaded', ()=>{ loadVerify(); loadPayment(); });
</script></body></html>

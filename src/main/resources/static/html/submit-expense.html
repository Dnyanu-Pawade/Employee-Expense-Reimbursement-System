<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Submit Expense | Enterprise Expense Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="../css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Employee Portal</span></div>
    <nav class="sidebar-nav">
      <a href="employee-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
      <a href="submit-expense.html" class="nav-item active"><i class="fas fa-plus-circle"></i> Submit Expense</a>
      <a href="my-claims.html" class="nav-item"><i class="fas fa-list"></i> My Claims</a>
      <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
      <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
      <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="topbar"><h5 class="mb-0 fw-bold">Submit Expense Claim</h5></div>
    <div class="content-body">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card">
            <div class="card-header"><h6>New Expense Claim</h6></div>
            <div class="card-body p-4">
              <div id="form-error" class="alert alert-danger d-none"></div>
              <div id="form-success" class="alert alert-success d-none"></div>
              <form id="expense-form">
                <div class="row">
                  <div class="col-md-8 mb-3"><label class="form-label fw-semibold">Title *</label><input type="text" id="title" class="form-control" required/></div>
                  <div class="col-md-4 mb-3"><label class="form-label fw-semibold">Category *</label>
                    <select id="category" class="form-select" required>
                      <option value="">Select...</option>
                      <option>TRAVEL</option><option>HOTEL</option><option>FOOD</option><option>FUEL</option>
                      <option>INTERNET</option><option>OFFICE_SUPPLIES</option><option>CLIENT_MEETING</option>
                      <option>MEDICAL</option><option>TRAINING</option><option>CONFERENCE</option><option>SOFTWARE</option><option>OTHER</option>
                    </select>
                  </div>
                </div>
                <div class="row">
                  <div class="col-md-4 mb-3"><label class="form-label fw-semibold">Amount (₹) *</label><input type="number" id="amount" class="form-control" step="0.01" min="0.01" required/></div>
                  <div class="col-md-4 mb-3"><label class="form-label fw-semibold">Expense Date *</label><input type="date" id="expenseDate" class="form-control" required/></div>
                  <div class="col-md-4 mb-3"><label class="form-label fw-semibold">Project Code</label><input type="text" id="projectCode" class="form-control" placeholder="e.g. PROJ-001"/></div>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Vendor Name</label><input type="text" id="vendorName" class="form-control"/></div>
                  <div class="col-md-6 mb-3"><label class="form-label fw-semibold">GST Number</label><input type="text" id="gstNumber" class="form-control"/></div>
                </div>
                <div class="mb-3"><label class="form-label fw-semibold">Description</label><textarea id="description" class="form-control" rows="3"></textarea></div>
                <div class="mb-3 form-check"><input type="checkbox" id="urgent" class="form-check-input"/><label class="form-check-label fw-semibold text-danger" for="urgent">Mark as Urgent</label></div>
                <div class="d-flex gap-2">
                  <button type="submit" class="btn btn-primary" id="submit-btn"><i class="fas fa-paper-plane me-1"></i>Submit Claim</button>
                  <a href="employee-dashboard.html" class="btn btn-outline-secondary">Cancel</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.getElementById('expenseDate').valueAsDate = new Date();
document.getElementById('expense-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  const errEl = document.getElementById('form-error');
  const sucEl = document.getElementById('form-success');
  errEl.classList.add('d-none'); sucEl.classList.add('d-none');
  btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i>Submitting...';
  try {
    await api.submitExpense({
      title: document.getElementById('title').value,
      category: document.getElementById('category').value,
      amount: parseFloat(document.getElementById('amount').value),
      expenseDate: document.getElementById('expenseDate').value,
      description: document.getElementById('description').value,
      vendorName: document.getElementById('vendorName').value,
      gstNumber: document.getElementById('gstNumber').value,
      projectCode: document.getElementById('projectCode').value,
      urgent: document.getElementById('urgent').checked
    });
    sucEl.textContent = 'Claim submitted successfully! It is now pending Team Lead approval.';
    sucEl.classList.remove('d-none');
    document.getElementById('expense-form').reset();
    document.getElementById('expenseDate').valueAsDate = new Date();
  } catch(err) { errEl.textContent = err.message; errEl.classList.remove('d-none'); }
  finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-paper-plane me-1"></i>Submit Claim'; }
});
</script>
</body>
</html>

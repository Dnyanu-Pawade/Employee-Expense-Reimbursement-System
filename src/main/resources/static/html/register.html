<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Register | Enterprise Expense</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body class="login-bg">
<div class="login-wrapper" style="max-width:540px">
  <div class="login-card">
    <div class="text-center mb-4"><div class="login-icon"><i class="fas fa-user-plus"></i></div><h4 class="fw-bold mt-2">Register</h4><p class="text-muted">Create your employee account</p></div>
    <div id="reg-error" class="alert alert-danger d-none"></div>
    <div id="reg-success" class="alert alert-success d-none"></div>
    <form id="register-form">
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Username *</label><input type="text" id="username" class="form-control" required/></div>
        <div class="col-md-6 mb-3"><label class="form-label">Full Name *</label><input type="text" id="fullName" class="form-control" required/></div>
      </div>
      <div class="mb-3"><label class="form-label">Email *</label><input type="email" id="email" class="form-control" required/></div>
      <div class="mb-3"><label class="form-label">Password *</label><input type="password" id="password" class="form-control" minlength="6" required/></div>
      <div class="row">
        <div class="col-md-6 mb-3"><label class="form-label">Employee ID</label><input type="text" id="employeeId" class="form-control"/></div>
        <div class="col-md-6 mb-3"><label class="form-label">Phone</label><input type="text" id="phone" class="form-control"/></div>
      </div>
      <div class="mb-3"><label class="form-label">Designation</label><input type="text" id="designation" class="form-control"/></div>
      <button type="submit" class="btn btn-primary w-100" id="reg-btn"><i class="fas fa-user-plus me-1"></i>Register</button>
    </form>
    <p class="text-center mt-3 text-muted" style="font-size:13px">Already have an account? <a href="/index.html">Sign in</a></p>
  </div>
</div>
<script src="../js/api.js"></script>
<script>
document.getElementById('register-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  const btn=document.getElementById('reg-btn');
  const errEl=document.getElementById('reg-error');
  const sucEl=document.getElementById('reg-success');
  errEl.classList.add('d-none'); sucEl.classList.add('d-none'); btn.disabled=true;
  try {
    const res = await fetch('/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,password:document.getElementById('password').value,email:document.getElementById('email').value,fullName:document.getElementById('fullName').value,employeeId:document.getElementById('employeeId').value,phone:document.getElementById('phone').value,designation:document.getElementById('designation').value})});
    const data = await res.json();
    if (data.success) { sucEl.textContent='Registered! Redirecting...'; sucEl.classList.remove('d-none'); setTimeout(()=>window.location.href='/index.html',2000); }
    else { errEl.textContent=data.message||'Registration failed'; errEl.classList.remove('d-none'); }
  } catch(err) { errEl.textContent=err.message; errEl.classList.remove('d-none'); }
  finally { btn.disabled=false; }
});
</script></body></html>

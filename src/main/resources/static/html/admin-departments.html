<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Departments | Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Admin Portal</span></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i> Manage Users</a>
    <a href="admin-claims.html" class="nav-item"><i class="fas fa-file-invoice"></i> All Claims</a>
    <a href="admin-departments.html" class="nav-item active"><i class="fas fa-sitemap"></i> Departments</a>
    <a href="audit-logs.html" class="nav-item"><i class="fas fa-history"></i> Audit Logs</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-shield"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Departments</h5><button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#deptModal"><i class="fas fa-plus me-1"></i>Add Department</button></div>
  <div class="content-body">
    <div class="card"><div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Name</th><th>Code</th><th>Description</th><th>Status</th></tr></thead>
        <tbody id="dept-body"><tr><td colspan="4" class="text-center py-3">Loading...</td></tr></tbody>
      </table>
    </div></div>
  </div>
</main>
</div>
<div class="modal fade" id="deptModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Add Department</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="mb-3"><label class="form-label">Name *</label><input type="text" id="dept-name" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Code</label><input type="text" id="dept-code" class="form-control"/></div>
      <div class="mb-3"><label class="form-label">Description</label><input type="text" id="dept-desc" class="form-control"/></div>
    </div>
    <div class="modal-footer"><button class="btn btn-primary" id="save-dept-btn">Save</button><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button></div>
  </div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
async function loadDepts() {
  const depts = await api.getDepartments();
  const tbody = document.getElementById('dept-body');
  tbody.innerHTML = depts.map(d=>`<tr><td><strong>${d.name}</strong></td><td><span class="badge bg-secondary">${d.code||'-'}</span></td><td>${d.description||'-'}</td><td><span class="badge ${d.active?'bg-success':'bg-danger'}">${d.active?'Active':'Inactive'}</span></td></tr>`).join('');
}
const modal = new bootstrap.Modal(document.getElementById('deptModal'));
document.getElementById('save-dept-btn').addEventListener('click', async()=>{
  await api.createDepartment({name:document.getElementById('dept-name').value,code:document.getElementById('dept-code').value,description:document.getElementById('dept-desc').value,active:true});
  modal.hide(); showToast('Department created!'); loadDepts();
});
document.addEventListener('DOMContentLoaded', loadDepts);
</script></body></html>

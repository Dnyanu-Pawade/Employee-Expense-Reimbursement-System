# Database
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:mysql://localhost:3306/enterprise_expense?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Dnyanu@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=true

# JWT
jwt.secret=${JWT_SECRET:EnterpriseExpensePlatformSecretKey2024VeryLongSecureKey!@#$%^&*}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Server
server.port=${PORT:8082}

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload-dir=${UPLOAD_DIR:uploads}

# Email
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your_email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your_app_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Actuator
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Scheduling
spring.task.scheduling.pool.size=5

# SLA hours
sla.approval.hours=48
sla.escalation.hours=72

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>My Claims</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span></div>
  <nav class="sidebar-nav">
    <a href="employee-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
    <a href="submit-expense.html" class="nav-item"><i class="fas fa-plus-circle"></i> Submit Expense</a>
    <a href="my-claims.html" class="nav-item active"><i class="fas fa-list"></i> My Claims</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
    <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">My Claims</h5><button class="btn btn-success btn-sm" onclick="api.downloadMyExcel()"><i class="fas fa-file-excel me-1"></i>Export</button></div>
  <div class="content-body">
    <div class="card mb-3"><div class="card-body py-2">
      <div class="row g-2 align-items-end">
        <div class="col-md-4"><input type="text" id="keyword" class="form-control form-control-sm" placeholder="Search title..."/></div>
        <div class="col-md-3"><select id="status-filter" class="form-select form-select-sm"><option value="">All Status</option><option>SUBMITTED</option><option>TEAM_LEAD_APPROVED</option><option>MANAGER_APPROVED</option><option>FINANCE_VERIFIED</option><option>PAYMENT_PROCESSED</option><option>TEAM_LEAD_REJECTED</option><option>MANAGER_REJECTED</option><option>FINANCE_REJECTED</option><option>ESCALATED</option></select></div>
        <div class="col-md-3"><select id="category-filter" class="form-select form-select-sm"><option value="">All Categories</option><option>TRAVEL</option><option>HOTEL</option><option>FOOD</option><option>FUEL</option><option>INTERNET</option><option>OFFICE_SUPPLIES</option><option>CLIENT_MEETING</option><option>MEDICAL</option><option>TRAINING</option><option>CONFERENCE</option><option>SOFTWARE</option><option>OTHER</option></select></div>
        <div class="col-md-2"><button class="btn btn-primary btn-sm w-100" onclick="loadClaims(0)"><i class="fas fa-search me-1"></i>Search</button></div>
      </div>
    </div></div>
    <div class="card">
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light"><tr><th>Claim #</th><th>Title</th><th>Category</th><th>Amount</th><th>Date</th><th>Status</th><th>Actions</th></tr></thead>
          <tbody id="claims-body"><tr><td colspan="7" class="text-center py-3">Loading...</td></tr></tbody>
        </table>
      </div>
      <div class="card-footer d-flex justify-content-between align-items-center">
        <small class="text-muted" id="page-info">-</small>
        <div id="pagination" class="d-flex gap-1"></div>
      </div>
    </div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
async function loadClaims(page=0) {
  const data = await api.searchExpenses({keyword:document.getElementById('keyword').value,status:document.getElementById('status-filter').value,category:document.getElementById('category-filter').value,page,size:10});
  const tbody = document.getElementById('claims-body');
  if (!data.content.length) { tbody.innerHTML='<tr><td colspan="7" class="text-center py-3 text-muted">No claims found</td></tr>'; document.getElementById('page-info').textContent='0 results'; document.getElementById('pagination').innerHTML=''; return; }
  tbody.innerHTML = data.content.map(c=>`<tr><td><small class="text-muted">${c.claimNumber}</small></td><td>${c.title}</td><td><span class="badge bg-secondary">${c.category}</span></td><td class="fw-semibold">₹${parseFloat(c.amount).toFixed(2)}</td><td>${formatDate(c.expenseDate)}</td><td>${statusBadge(c.status)}</td><td><button class="btn btn-outline-danger btn-sm" onclick="api.downloadPdf(${c.id},'${c.claimNumber}')"><i class="fas fa-file-pdf"></i></button></td></tr>`).join('');
  document.getElementById('page-info').textContent=`${data.numberOfElements} of ${data.totalElements}`;
  const pages = document.getElementById('pagination'); pages.innerHTML='';
  for(let i=0;i<data.totalPages;i++){const btn=document.createElement('button');btn.className=`btn btn-sm ${i===page?'btn-primary':'btn-outline-secondary'}`;btn.textContent=i+1;btn.onclick=()=>loadClaims(i);pages.appendChild(btn);}
}
document.addEventListener('DOMContentLoaded',()=>loadClaims(0));
</script></body></html>

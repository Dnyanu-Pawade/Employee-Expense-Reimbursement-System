<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span></div>
  <nav class="sidebar-nav">
    <a href="javascript:history.back()" class="nav-item"><i class="fas fa-arrow-left"></i> Back</a>
    <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i> Profile</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">My Profile</h5></div>
  <div class="content-body"><div class="row justify-content-center"><div class="col-lg-6">
    <div class="card"><div class="card-body p-4">
      <div id="success" class="alert alert-success d-none"></div>
      <div id="error" class="alert alert-danger d-none"></div>
      <form id="profile-form">
        <div class="mb-3"><label class="form-label fw-semibold">Full Name</label><input type="text" id="fullName" class="form-control"/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Email</label><input type="email" id="email" class="form-control" disabled/></div>
        <div class="mb-3"><label class="form-label fw-semibold">Phone</label><input type="text" id="phone" class="form-control"/></div>
        <div class="row">
          <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Designation</label><input type="text" id="designation" class="form-control"/></div>
          <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Department</label><input type="text" id="department" class="form-control" disabled/></div>
        </div>
        <button type="submit" class="btn btn-primary"><i class="fas fa-save me-1"></i>Save Changes</button>
      </form>
    </div></div>
  </div></div></div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const p = await api.getProfile();
  document.getElementById('fullName').value=p.fullName||'';
  document.getElementById('email').value=p.email||'';
  document.getElementById('phone').value=p.phone||'';
  document.getElementById('designation').value=p.designation||'';
  document.getElementById('department').value=p.department?.name||'';
});
document.getElementById('profile-form').addEventListener('submit', async(e)=>{
  e.preventDefault();
  try {
    await api.updateProfile({fullName:document.getElementById('fullName').value,phone:document.getElementById('phone').value,designation:document.getElementById('designation').value});
    document.getElementById('success').textContent='Profile updated!'; document.getElementById('success').classList.remove('d-none');
    document.getElementById('error').classList.add('d-none');
  } catch(err) { document.getElementById('error').textContent=err.message; document.getElementById('error').classList.remove('d-none'); }
});
</script></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Dashboard | Enterprise Expense Platform</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="../css/style.css" rel="stylesheet"/>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Employee Portal</span></div>
    <nav class="sidebar-nav">
      <a href="employee-dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
      <a href="submit-expense.html" class="nav-item"><i class="fas fa-plus-circle"></i> Submit Expense</a>
      <a href="my-claims.html" class="nav-item"><i class="fas fa-list"></i> My Claims</a>
      <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications <span id="notif-badge" class="badge bg-danger ms-auto d-none">0</span></a>
      <a href="profile.html" class="nav-item"><i class="fas fa-user"></i> Profile</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-info">
        <div class="user-avatar"><i class="fas fa-user"></i></div>
        <div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div><div class="user-dept" id="sidebar-dept">-</div></div>
      </div>
      <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
    </div>
  </aside>
  <main class="main-content">
    <div class="topbar"><h5 class="mb-0 fw-bold">Employee Dashboard</h5><a href="submit-expense.html" class="btn btn-primary btn-sm"><i class="fas fa-plus me-1"></i>New Claim</a></div>
    <div class="content-body">
      <div class="row g-3 mb-4">
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-primary bg-opacity-10 text-primary"><i class="fas fa-file-invoice"></i></div><div><div class="stat-value" id="total-claims">-</div><div class="stat-label">Total Claims</div></div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-warning bg-opacity-10 text-warning"><i class="fas fa-clock"></i></div><div><div class="stat-value" id="pending-claims">-</div><div class="stat-label">Pending</div></div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-success bg-opacity-10 text-success"><i class="fas fa-check-circle"></i></div><div><div class="stat-value" id="paid-claims">-</div><div class="stat-label">Paid</div></div></div></div>
        <div class="col-md-3"><div class="stat-card"><div class="stat-icon bg-info bg-opacity-10 text-info"><i class="fas fa-rupee-sign"></i></div><div><div class="stat-value" id="total-amount">-</div><div class="stat-label">Total Amount</div></div></div></div>
      </div>
      <div class="card">
        <div class="card-header"><h6>Recent Claims</h6><button class="btn btn-success btn-sm" onclick="api.downloadMyExcel()"><i class="fas fa-file-excel me-1"></i>Export</button></div>
        <div class="card-body p-0">
          <table class="table table-hover mb-0">
            <thead class="table-light"><tr><th>Claim #</th><th>Title</th><th>Category</th><th>Amount</th><th>Date</th><th>Status</th><th>PDF</th></tr></thead>
            <tbody id="claims-body"><tr><td colspan="7" class="text-center py-3">Loading...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  const claims = await api.getMyExpenses();
  document.getElementById('total-claims').textContent = claims.length;
  document.getElementById('pending-claims').textContent = claims.filter(c=>['SUBMITTED','TEAM_LEAD_APPROVED','MANAGER_APPROVED','FINANCE_VERIFIED'].includes(c.status)).length;
  document.getElementById('paid-claims').textContent = claims.filter(c=>c.status==='PAYMENT_PROCESSED').length;
  document.getElementById('total-amount').textContent = formatCurrency(claims.reduce((s,c)=>s+parseFloat(c.amount||0),0));
  const tbody = document.getElementById('claims-body');
  if (!claims.length) { tbody.innerHTML='<tr><td colspan="7" class="text-center py-3 text-muted">No claims yet. <a href="submit-expense.html">Submit one now</a></td></tr>'; return; }
  tbody.innerHTML = claims.slice(0,10).map(c=>`<tr><td><small class="text-muted">${c.claimNumber}</small></td><td>${c.title}</td><td><span class="badge bg-secondary">${c.category}</span></td><td class="fw-semibold">₹${parseFloat(c.amount).toFixed(2)}</td><td>${formatDate(c.expenseDate)}</td><td>${statusBadge(c.status)}</td><td><button class="btn btn-outline-danger btn-sm" onclick="api.downloadPdf(${c.id},'${c.claimNumber}')"><i class="fas fa-file-pdf"></i></button></td></tr>`).join('');
});
</script>
</body>
</html>

<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Payment History</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Finance Portal</span></div>
  <nav class="sidebar-nav">
    <a href="finance-dashboard.html" class="nav-item"><i class="fas fa-home"></i> Dashboard</a>
    <a href="payment-history.html" class="nav-item active"><i class="fas fa-money-bill"></i> Payment History</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Payment History</h5></div>
  <div class="content-body">
    <div class="card"><div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Claim #</th><th>Employee</th><th>Amount</th><th>Payment Ref</th><th>Bank Ref</th><th>Mode</th><th>Processed By</th><th>Date</th></tr></thead>
        <tbody id="payments-body"><tr><td colspan="8" class="text-center py-3">Loading...</td></tr></tbody>
      </table>
    </div></div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const payments = await api.getPayments();
  const tbody = document.getElementById('payments-body');
  if (!payments.length) { tbody.innerHTML='<tr><td colspan="8" class="text-center py-3 text-muted">No payments yet</td></tr>'; return; }
  tbody.innerHTML = payments.map(p=>`<tr><td><small>${p.claim?.claimNumber||'-'}</small></td><td>${p.claim?.employee?.fullName||'-'}</td><td class="fw-semibold text-success">₹${parseFloat(p.amount).toFixed(2)}</td><td><code>${p.paymentReference||'-'}</code></td><td><small>${p.bankTransferRef||'-'}</small></td><td><span class="badge bg-info text-dark">${p.paymentMode||'-'}</span></td><td>${p.processedBy?.fullName||'-'}</td><td>${formatDateTime(p.processedAt)}</td></tr>`).join('');
});
</script></body></html>

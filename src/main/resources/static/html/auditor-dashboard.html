<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Auditor Dashboard | Enterprise Expense</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Auditor Portal</span></div>
  <nav class="sidebar-nav">
    <a href="auditor-dashboard.html" class="nav-item active"><i class="fas fa-home"></i> Dashboard</a>
    <a href="audit-logs.html" class="nav-item"><i class="fas fa-history"></i> Audit Logs</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-secret"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Auditor Dashboard</h5><button class="btn btn-success btn-sm" onclick="api.downloadAllExcel()"><i class="fas fa-file-excel me-1"></i>Export All</button></div>
  <div class="content-body">
    <div class="card mb-3">
      <div class="card-header"><h6>All Claims — Read Only View</h6></div>
      <div class="card-body p-0">
        <table class="table table-hover mb-0">
          <thead class="table-light"><tr><th>Claim #</th><th>Employee</th><th>Dept</th><th>Title</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
          <tbody id="claims-body"><tr><td colspan="7" class="text-center py-3">Loading...</td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async()=>{
  const claims = await api.getAllClaims();
  const tbody = document.getElementById('claims-body');
  if (!claims.length) { tbody.innerHTML='<tr><td colspan="7" class="text-center py-3 text-muted">No claims</td></tr>'; return; }
  tbody.innerHTML = claims.map(c=>`<tr><td><small>${c.claimNumber}</small></td><td>${c.employee?.fullName||'-'}</td><td><small>${c.employee?.department?.name||'-'}</small></td><td>${c.title}</td><td class="fw-semibold">₹${parseFloat(c.amount).toFixed(2)}</td><td>${formatDate(c.expenseDate)}</td><td>${statusBadge(c.status)}</td></tr>`).join('');
});
</script></body></html>

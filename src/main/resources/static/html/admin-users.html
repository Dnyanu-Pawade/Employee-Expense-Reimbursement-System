<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>Admin Users</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Admin Portal</span></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="admin-users.html" class="nav-item active"><i class="fas fa-users"></i> Manage Users</a>
    <a href="admin-claims.html" class="nav-item"><i class="fas fa-file-invoice"></i> All Claims</a>
    <a href="admin-departments.html" class="nav-item"><i class="fas fa-sitemap"></i> Departments</a>
    <a href="audit-logs.html" class="nav-item"><i class="fas fa-history"></i> Audit Logs</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-shield"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">Manage Users</h5></div>
  <div class="content-body">
    <div class="card"><div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Name</th><th>Username</th><th>Email</th><th>Department</th><th>Role</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="users-body"><tr><td colspan="7" class="text-center py-3">Loading...</td></tr></tbody>
      </table>
    </div></div>
  </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
async function loadUsers() {
  const users = await api.getAllUsers();
  const tbody = document.getElementById('users-body');
  tbody.innerHTML = users.map(u=>`<tr>
    <td><strong>${u.fullName}</strong><br><small class="text-muted">${u.employeeId||''}</small></td>
    <td>${u.username}</td>
    <td><small>${u.email}</small></td>
    <td><small>${u.department?.name||'-'}</small></td>
    <td><select class="form-select form-select-sm" style="width:150px" onchange="api.updateUserRole(${u.id},this.value).then(()=>showToast('Role updated'))">
      <option ${u.role==='ROLE_EMPLOYEE'?'selected':''} value="ROLE_EMPLOYEE">Employee</option>
      <option ${u.role==='ROLE_TEAM_LEAD'?'selected':''} value="ROLE_TEAM_LEAD">Team Lead</option>
      <option ${u.role==='ROLE_MANAGER'?'selected':''} value="ROLE_MANAGER">Manager</option>
      <option ${u.role==='ROLE_FINANCE'?'selected':''} value="ROLE_FINANCE">Finance</option>
      <option ${u.role==='ROLE_AUDITOR'?'selected':''} value="ROLE_AUDITOR">Auditor</option>
      <option ${u.role==='ROLE_ADMIN'?'selected':''} value="ROLE_ADMIN">Admin</option>
    </select></td>
    <td><span class="badge ${u.active?'bg-success':'bg-danger'}">${u.active?'Active':'Inactive'}</span></td>
    <td><button class="btn btn-sm ${u.active?'btn-warning':'btn-success'}" onclick="toggleUser(${u.id})">${u.active?'Deactivate':'Activate'}</button></td>
  </tr>`).join('');
}
async function toggleUser(id) { await api.toggleUserStatus(id); showToast('Status updated'); loadUsers(); }
document.addEventListener('DOMContentLoaded', loadUsers);
</script></body></html>

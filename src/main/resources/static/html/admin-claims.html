<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><title>All Claims | Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<link href="../css/style.css" rel="stylesheet"/></head>
<body><div class="layout">
<aside class="sidebar">
  <div class="sidebar-header"><span class="brand"><i class="fas fa-building me-2"></i>Enterprise EXP</span><span class="brand-sub">Admin Portal</span></div>
  <nav class="sidebar-nav">
    <a href="admin-dashboard.html" class="nav-item"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
    <a href="admin-users.html" class="nav-item"><i class="fas fa-users"></i> Manage Users</a>
    <a href="admin-claims.html" class="nav-item active"><i class="fas fa-file-invoice"></i> All Claims</a>
    <a href="admin-departments.html" class="nav-item"><i class="fas fa-sitemap"></i> Departments</a>
    <a href="audit-logs.html" class="nav-item"><i class="fas fa-history"></i> Audit Logs</a>
    <a href="notifications.html" class="nav-item"><i class="fas fa-bell"></i> Notifications</a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info"><div class="user-avatar"><i class="fas fa-user-shield"></i></div><div><div class="user-name" id="sidebar-username">-</div><div class="user-role" id="sidebar-role">-</div></div></div>
    <button class="btn btn-outline-light btn-sm w-100" id="logout-btn"><i class="fas fa-sign-out-alt me-1"></i>Logout</button>
  </div>
</aside>
<main class="main-content">
  <div class="topbar"><h5 class="mb-0 fw-bold">All Claims</h5><button class="btn btn-success btn-sm" onclick="api.downloadAllExcel()"><i class="fas fa-file-excel me-1"></i>Export Excel</button></div>
  <div class="content-body">
    <div class="card mb-3"><div class="card-body py-2">
      <div class="row g-2">
        <div class="col-md-3"><input type="text" id="keyword" class="form-control form-control-sm" placeholder="Search..."/></div>
        <div class="col-md-3"><select id="status-filter" class="form-select form-select-sm"><option value="">All Status</option><option>SUBMITTED</option><option>TEAM_LEAD_APPROVED</option><option>MANAGER_APPROVED</option><option>FINANCE_VERIFIED</option><option>PAYMENT_PROCESSED</option><option>ESCALATED</option></select></div>
        <div class="col-md-2"><button class="btn btn-primary btn-sm w-100" onclick="loadClaims(0)"><i class="fas fa-search me-1"></i>Search</button></div>
      </div>
    </div></div>
    <div class="card"><div class="card-body p-0">
      <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Claim #</th><th>Employee</th><th>Dept</th><th>Title</th><th>Amount</th><th>Date</th><th>Status</th><th>PDF</th></tr></thead>
        <tbody id="claims-body"><tr><td colspan="8" class="text-center py-3">Loading...</td></tr></tbody>
      </table>
    </div>
    <div class="card-footer d-flex justify-content-between"><small class="text-muted" id="page-info">-</small><div id="pagination" class="d-flex gap-1"></div></div>
    </div>
  </div>
</main>
</div>
<script src="../js/api.js"></script><script src="../js/app.js"></script>
<script>
async function loadClaims(page=0) {
  const data = await api.searchAllClaims({keyword:document.getElementById('keyword').value,status:document.getElementById('status-filter').value,page,size:15});
  const tbody = document.getElementById('claims-body');
  if (!data.content.length) { tbody.innerHTML='<tr><td colspan="8" class="text-center py-3 text-muted">No claims found</td></tr>'; return; }
  tbody.innerHTML = data.content.map(c=>`<tr><td><small>${c.claimNumber}</small></td><td>${c.employee?.fullName||'-'}</td><td><small>${c.employee?.department?.name||'-'}</small></td><td>${c.title}</td><td class="fw-semibold">₹${parseFloat(c.amount).toFixed(2)}</td><td>${formatDate(c.expenseDate)}</td><td>${statusBadge(c.status)}</td><td><button class="btn btn-outline-danger btn-sm" onclick="api.downloadPdf(${c.id},'${c.claimNumber}')"><i class="fas fa-file-pdf"></i></button></td></tr>`).join('');
  document.getElementById('page-info').textContent=`${data.numberOfElements} of ${data.totalElements}`;
  const pages=document.getElementById('pagination'); pages.innerHTML='';
  for(let i=0;i<data.totalPages;i++){const btn=document.createElement('button');btn.className=`btn btn-sm ${i===page?'btn-primary':'btn-outline-secondary'}`;btn.textContent=i+1;btn.onclick=()=>loadClaims(i);pages.appendChild(btn);}
}
document.addEventListener('DOMContentLoaded',()=>loadClaims(0));
</script></body></html>
